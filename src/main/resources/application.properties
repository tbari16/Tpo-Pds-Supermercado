spring.application.name=supermercado

# Configuracion activa para pruebas locales con H2.
spring.datasource.url=jdbc:h2:mem:supermercado_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

jwt.secret=eMarketSuperSecretKey2026UadeProcesoDesarrolloSoftwareJWT256Bits!!
jwt.expiration=86400000

